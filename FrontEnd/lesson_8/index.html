    <style>
        .test-overlay {
        position: absolute;
        top: 0; /* Сместим верхний край элемента к центру экрана по вертикали */
        left: 50%; /* Сместим левый край элемента к центру экрана по горизонтали */
        width: 1440px; /* Ширина и высота по размеру вьюпорта */
        height: 3629px;
        background: url('../img/MacBook Pro - 12.jpg') no-repeat center center / cover; /* Замените путь к вашему изображению */
        opacity: 0.5; /* Начальная прозрачность */
        z-index: 1000; /* Убедитесь, что слой наверху */
        transform: translateX(-50%); /* Смещение элемента на -50% его ширины влево */
        }
    </style>
        <!-- Мой тест див -->
        <div class="test-overlay">
            <!-- Мой тест див -->
        </div>
        <input type="range" min="0" max="1" step="0.1" value="0.5" id="opacity-slider" style="position: fixed; left: 20px; bottom: 20px; z-index: 1100;">
    
        <script>
            document.getElementById('opacity-slider').addEventListener('input', function(e) {
            document.querySelector('.test-overlay').style.opacity = e.target.value;
        });
        </script>

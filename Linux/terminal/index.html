<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Личная Консоль</title>
    <style>
        body, html {
            margin: 0;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        iframe {
            width: 1000px;
            height: 100%;
            border: none;
        }

        .container {
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
            height: 100vh;
        }
        .term {
        width: 1000px; /* Устанавливаем ширину терминала */
        height: 100px; /* Высоту можно оставить автоматической или задать конкретное значение */
        }
        #term_container .term {
            width: 1000px !important; /* Указываем нужную ширину и делаем стиль приоритетным */
            height: 540px !important; /* Задаём высоту, если это необходимо */
        }
        iframe {
            margin: 0;
        }
</style>

</head>
<body>
    <div class="container">
        <iframe src="https://bellard.org/jslinux/vm.html?url=alpine-x86.cfg&mem=192"></iframe>
    </div>
    <script>
        window.onload = function() {
          var termElement = document.querySelector('.term'); // Получаем доступ к элементу терминала
          if (termElement) {
            termElement.style.width = '1000px'; // Задаём ширину 1000 пикселей
            termElement.style.height = '540px'; // Задаём высоту, если это необходимо
          }
        };
      </script>
</body>
</html>
